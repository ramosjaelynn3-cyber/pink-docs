<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✧LessyDocs✧</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Caveat&family=VT323&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Nunito;
    background: linear-gradient(135deg,#ffe6f3,#ffcce6);
    height: 100vh;
    overflow-y: auto;
    color: #5b2a45;
}

.app {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(18px);
}

.sidebar {
    width: 270px;
    background: rgba(255,255,255,0.4);
    padding: 20px;
}

.logo {
    font-size: 26px;
    color: #ff4fa0;
}

.new-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background: #ff4fa0;
    color: white;
    cursor: pointer;
}

.doc {
    padding: 10px;
    margin-top: 10px;
    background: rgba(255,255,255,0.6);
    border-radius: 12px;
    cursor: pointer;
}

.main {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.topbar {
    display: flex;
    gap: 8px;
    align-items: center;
    background: rgba(255,255,255,0.45);
    padding: 12px;
    border-radius: 18px;
}

.menu {
    position: relative;
}

.menu button {
    border: none;
    padding: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
}

.drop {
    position: absolute;
    top: 40px;
    background: white;
    border-radius: 12px;
    padding: 8px;
    display: none;
}

.title {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
}

.tools {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
}

.tools button,
.tools select,
.tools input {
    border: none;
    padding: 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.7);
}

/* palettes */
.palette,
.colorPalette {
    position: absolute;
    top: 45px;
    display: none;
    padding: 10px;
    border-radius: 16px;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 10px 25px rgba(255,120,170,0.2);
}

.color {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: none;
    margin: 2px;
    cursor: pointer;
}

.clear {
    width: 100%;
    margin-top: 6px;
    padding: 6px;
    border-radius: 10px;
    border: none;
    background: #ffe0ea;
    cursor: pointer;
}

.editor {
    flex: 1;
    margin-top: 15px;
    padding: 25px;
    background: rgba(255,255,255,0.55);
    border-radius: 24px;
    outline: none;
    overflow-y: auto;
}

/* 💗 NEW SIZE TOOL STYLE */
.sizeBox {
    width: 55px;
    text-align: center;
}
.heartBtn {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
    <div class="logo">✧LessyDocs✧</div>
    <button class="new-btn" onclick="newDoc()">+ New</button>
    <div id="docs"></div>
</div>

<div class="main">

<div class="topbar">

    <div class="menu">
        <button onclick="toggleMenu()">File</button>
        <div id="menu" class="drop">
            <button onclick="save()">Save</button>
            <button onclick="pdf()">PDF</button>
            <button onclick="del()">Delete</button>
        </div>
    </div>

    <input id="title" class="title" placeholder="Untitled"/>

    <div class="tools">

        <button onclick="cmd('bold')"><b>B</b></button>
        <button onclick="cmd('italic')"><i>I</i></button>
        <button onclick="cmd('underline')"><u>U</u></button>

        <button onclick="cmd('justifyLeft')">⬅</button>
        <button onclick="cmd('justifyCenter')">⬌</button>
        <button onclick="cmd('justifyRight')">➡</button>

        <!-- ✔ UPDATED SIZE TOOL -->
        <select onchange="setSize(this.value)">
            <option value="12px">12</option>
            <option value="14px">14</option>
            <option value="16px">16</option>
            <option value="18px" selected>18</option>
            <option value="24px">24</option>
            <option value="30px">30</option>
        </select>

        <!-- 💗 CUSTOM SIZE INPUT + HEART -->
        <input id="customSize" class="sizeBox" maxlength="3" placeholder="px"
               onkeydown="if(event.key==='Enter') applyCustomSize()">

        <button class="heartBtn" onclick="applyCustomSize()">💗</button>

        <select onchange="font(this.value)">
            <option value="Nunito">Nunito</option>
            <option value="Quicksand">Quicksand</option>
            <option value="Caveat">Caveat</option>
            <option value="VT323">VT323</option>
        </select>

        <button onclick="togglePalette()">🌸</button>

        <div id="palette" class="palette">
            <button class="color" style="background:#d52d00" onclick="hl('#d52d00')"></button>
            <button class="color" style="background:#ff9a56" onclick="hl('#ff9a56')"></button>
            <button class="color" style="background:#ffffff" onclick="hl('#ffffff')"></button>
            <button class="color" style="background:#d162a4" onclick="hl('#d162a4')"></button>
            <button class="color" style="background:#a30262" onclick="hl('#a30262')"></button>
            <button class="clear" onclick="clearHL()">❌ clear</button>
        </div>

        <button onclick="toggleColor()">🌺</button>

        <div id="colorPalette" class="colorPalette">
            <input type="color" onchange="fontColor(this.value)">
        </div>

    </div>
</div>

<div id="editor" class="editor" contenteditable="true"></div>

</div>

</div>

<script>
let docs = JSON.parse(localStorage.getItem("docs")) || [];
let current = null;

const ed = document.getElementById("editor");
const title = document.getElementById("title");

/* SIZE SYSTEM */
function setSize(val){
    document.execCommand("fontSize", false, "7");
    document.querySelectorAll("font[size='7']").forEach(el=>{
        el.removeAttribute("size");
        el.style.fontSize = val;
    });
}

/* 💗 CUSTOM SIZE APPLY (NEW FIX) */
function applyCustomSize(){
    let size = document.getElementById("customSize").value;
    if(!size) return;

    if(!size.includes("px") && !size.includes("em") && !size.includes("%")){
        size = size + "px";
    }

    document.execCommand("fontSize", false, "7");
    document.querySelectorAll("font[size='7']").forEach(el=>{
        el.removeAttribute("size");
        el.style.fontSize = size;
    });
}

/* FONT */
function font(f){
    document.execCommand("fontName", false, f);
}

/* HIGHLIGHT */
function hl(color){
    document.execCommand("hiliteColor", false, color);
}

function clearHL(){
    document.execCommand("hiliteColor", false, "transparent");
}

/* FONT COLOR */
function toggleColor(){
    let p = document.getElementById("colorPalette");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function fontColor(c){
    document.execCommand("foreColor", false, c);
}

/* FILE */
function toggleMenu(){
    document.getElementById("menu").style.display =
    document.getElementById("menu").style.display === "block" ? "none" : "block";
}

/* DOCS */
function newDoc(){
    let d = {id:Date.now(), title:"Untitled", content:""};
    docs.unshift(d);
    current = d.id;
    load();
    render();
    save();
}

function load(){
    let d = docs.find(x=>x.id===current);
    if(!d) return;
    title.value = d.title;
    ed.innerHTML = d.content;
}

function render(){
    document.getElementById("docs").innerHTML = "";
    docs.forEach(d=>{
        let div = document.createElement("div");
        div.className = "doc";
        div.innerText = d.title;
        div.onclick = ()=>{
            current = d.id;
            load();
        };
        document.getElementById("docs").appendChild(div);
    });
}

function del(){
    docs = docs.filter(x=>x.id!==current);
    current = docs[0]?.id || null;
    render();
    load();
    save();
}

function save(){
    let d = docs.find(x=>x.id===current);
    if(!d) return;
    d.title = title.value;
    d.content = ed.innerHTML;
    localStorage.setItem("docs", JSON.stringify(docs));
}

/* EDIT */
function cmd(c){ document.execCommand(c); }

/* PDF */
function pdf(){
    const { jsPDF } = window.jspdf;
    const p = new jsPDF();
    p.text(title.value, 10, 10);
    p.text(ed.innerText, 10, 20);
    p.save("doc.pdf");
}

/* AUTO SAVE */
ed.addEventListener("input", save);
title.addEventListener("input", save);

/* INIT */
if(docs.length){
    current = docs[0].id;
    load();
}else{
    newDoc();
}
render();
</script>

</body>
</html>
