<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✧JaeDocs✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">✧Docs✧</div>

    <button class="new-doc-btn" onclick="createDoc()">+ New Document</button>

    <div class="doc-list" id="docList"></div>
</aside>

<!-- MAIN -->
<main class="main">

   <div class="topbar cute-bar">

    <!-- FILE -->
    <div class="file-menu">
        <button onclick="toggleFileMenu()">✦File✦ </button>

        <div id="fileDropdown" class="dropdown hidden">
            <button onclick="manualSave()">Save</button>
            <button onclick="downloadPDF()">Export PDF</button>
            <button onclick="deleteDoc()">Delete</button>
        </div>
    </div>

    <!-- TITLE -->
    <input id="titleInput" class="title-input" placeholder="New Document"/>

    <!-- ✨ FORMATTING RIBBON -->
    <div class="ribbon">

        <div class="group">
            <button onclick="toggleBold()" title="Bold">B</button>
            <button onclick="toggleItalic()" title="Italic"><i>I</i></button>
            <button onclick="toggleUnderline()" title="Underline"><u>U</u></button>
        </div>

        <div class="group">
            <button onclick="alignText('left')">⬅</button>
            <button onclick="alignText('center')">⬍</button>
            <button onclick="alignText('right')">➡</button>
        </div>

        <div class="group">
            <button onclick="undo()">↶</button>
            <button onclick="redo()">↷</button>
        </div>

        <div class="stats">
            <span id="wordCount">0</span> words
        </div>

    </div>
</div>

    <!-- EDITOR -->
    <div class="editor">
        <textarea id="editor" placeholder="✧Start writing...✧"></textarea>
    </div>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
