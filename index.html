<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✧ JaeDocs ✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Caveat&family=VT323&family=Space+Grotesk&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">✧ LessyDocs ✧</div>

    <button class="new-btn" onclick="createDoc()">＋ New Doc</button>

    <div id="docList"></div>
</aside>

<!-- MAIN -->
<main class="main">

<!-- 🌸 TOP BAR (FULL CUTE TOOLBAR) -->
<div class="topbar">

    <!-- FILE MENU -->
    <div class="menu">
        <button onclick="toggleMenu()">File ✦</button>
        <div id="menuDrop" class="dropdown hidden">
            <button onclick="saveDoc()">💾 Save</button>
            <button onclick="downloadPDF()">Export PDF</button>
            <button onclick="deleteDoc()">Delete</button>
        </div>
    </div>

    <input id="title" class="title" placeholder="Untitled Document"/>

    <!-- ✨ EDITING TOOLS -->
    <div class="tools">

        <button onclick="cmd('bold')"><b>B</b></button>
        <button onclick="cmd('italic')"><i>I</i></button>
        <button onclick="cmd('underline')"><u>U</u></button>

        <button onclick="highlight()">🌸</button>

        <button onclick="align('left')">⬅</button>
        <button onclick="align('center')">⬌</button>
        <button onclick="align('right')">➡</button>

        <select onchange="changeFont(this.value)">
            <option value="Nunito">Cute</option>
            <option value="Quicksand">Y2K</option>
            <option value="Caveat">Handwritten</option>
            <option value="VT323">Retro</option>
            <option value="Space Grotesk">Cyber</option>
        </select>

    </div>

</div>

<!-- ✍ EDITOR -->
<div class="editor-wrapper">
    <div id="editor" contenteditable="true" class="editor"></div>
</div>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
