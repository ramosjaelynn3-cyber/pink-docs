<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 AngelDocs 🌸</title>
    <style>
        :root {
            --bg-color: #ffeef8;
            --primary-pink: #ff85c2;
            --dark-pink: #d9418d;
            --light-pink: #fff0f7;
            --accent-blue: #a3e5ff;
            --text-color: #4a283c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--light-pink) 20%, transparent 20%),
                              radial-gradient(var(--light-pink) 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER AREA --- */
        header {
            background: white;
            border-bottom: 4px ridge var(--primary-pink);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .left-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px var(--accent-blue);
            cursor: pointer;
        }

        .doc-info {
            display: flex;
            flex-direction: column;
        }

        #doc-title {
            font-size: 18px;
            border: 2px dotted transparent;
            padding: 2px 5px;
            color: var(--dark-pink);
            font-weight: bold;
            background: none;
            outline: none;
            border-radius: 5px;
        }

        #doc-title:focus, #doc-title:hover {
            border-color: var(--primary-pink);
            background: var(--light-pink);
        }

        /* --- TOOLBAR --- */
        .toolbar {
            background: var(--light-pink);
            border-bottom: 3px double var(--primary-pink);
            padding: 8px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar button, .toolbar select {
            background: white;
            border: 2px solid var(--primary-pink);
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            color: var(--dark-pink);
            box-shadow: 2px 2px 0px var(--primary-pink);
            transition: all 0.1s ease;
        }

        .toolbar button:active {
            box-shadow: 0px 0px 0px var(--primary-pink);
            transform: translate(2px, 2px);
        }

        .toolbar button:hover, .toolbar select:hover {
            background: #fff6fb;
            border-color: var(--dark-pink);
        }

        /* --- MAIN WORKSPACE --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar for Saved Docs */
        .sidebar {
            width: 220px;
            background: white;
            border-right: 4px ridge var(--primary-pink);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .sidebar h3 {
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px dashed var(--primary-pink);
            color: var(--dark-pink);
        }

        .doc-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
        }

        .doc-item {
            padding: 8px;
            margin-bottom: 6px;
            background: var(--light-pink);
            border: 1px solid var(--primary-pink);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }

        .doc-item:hover {
            background: var(--primary-pink);
            color: white;
        }

        .delete-btn {
            background: none;
            border: none;
            color: red;
            font-weight: bold;
            cursor: pointer;
            margin-left: 5px;
        }

        /* Document Editor Page */
        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            background: #fff0f7;
        }

        .page {
            width: 8.5in;
            min-height: 11in;
            background: white;
            padding: 1in;
            box-shadow: 0px 4px 20px rgba(217, 65, 141, 0.15);
            border: 3px double var(--primary-pink);
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
        }

        /* --- STATUS BAR --- */
        footer {
            background: white;
            border-top: 3px ridge var(--primary-pink);
            padding: 5px 20px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            color: var(--dark-pink);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="left-header">
            <div class="logo" onclick="createNewDoc()">✨AngelDocs✨</div>
            <div class="doc-info">
                <input type="text" id="doc-title" value="Untitled Glitter Doc" oninput="saveCurrentDoc()">
            </div>
        </div>
        <div>
            <button class="toolbar button" onclick="createNewDoc()" style="margin: 0;">🎀 New Doc</button>
        </div>
    </header>

    <div class="toolbar">
        <button onclick="format('bold')"><b>B</b></button>
        <button onclick="format('italic')"><i>I</i></button>
        <button onclick="format('underline')"><u>U</u></button>
        <button onclick="format('strikeThrough')"><s>S</s></button>
        
        <select onchange="format('formatBlock', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Style</option>
            <option value="H1">Heading 1</option>
            <option value="H2">Heading 2</option>
            <option value="P">Paragraph</option>
        </select>

        <select onchange="format('fontSize', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Size</option>
            <option value="3">Small</option>
            <option value="4">Normal</option>
            <option value="5">Large</option>
            <option value="6">Huge</option>
        </select>

        <select onchange="format('foreColor', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Color</option>
            <option value="#d9418d">Pink</option>
            <option value="#a3e5ff">Blue</option>
            <option value="#7d53de">Purple</option>
            <option value="#000000">Black</option>
        </select>

        <button onclick="format('justifyLeft')">⬅ Align L</button>
        <button onclick="format('justifyCenter')">🔀 Center</button>
        <button onclick="format('justifyRight')">➡ Align R</button>
        <button onclick="format('insertUnorderedList')">• List</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <h3>💌 Saved Docs</h3>
            <ul class="doc-list" id="doc-list">
                </ul>
        </div>

        <div class="editor-container">
            <div class="page" id="editor" contenteditable="true" oninput="saveCurrentDoc()"></div>
        </div>
    </div>

    <footer>
        <span id="status">Status: All changes saved to local storage ✨</span>
        <span id="word-count">Words: 0</span>
    </footer>

    <script>
        let currentDocId = '';

        // Run application setup on load
        window.onload = function() {
            initializeSidebar();
            loadDefaultOrLatestDoc();
            setupWordCounter();
        };

        // Rich Text Formatting helper
        function format(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor').focus();
            saveCurrentDoc();
        }

        // Generate safe unique IDs
        function generateId() {
            return 'doc_' + Date.now();
        }

        // Get list of all docs from localStorage
        function getSavedDocs() {
            const docs = localStorage.getItem('angel_docs_manifest');
            return docs ? JSON.parse(docs) : [];
        }

        // Save the list of docs
        function saveSavedDocsList(list) {
            localStorage.setItem('angel_docs_manifest', JSON.stringify(list));
        }

        // Initialize sidebar lists
        function initializeSidebar() {
            const docList = document.getElementById('doc-list');
            docList.innerHTML = '';
            const docs = getSavedDocs();

            docs.forEach(doc => {
                const li = document.createElement('li');
                li.className = 'doc-item';
                li.innerHTML = `
                    <span onclick="loadDoc('${doc.id}')">🌸 ${doc.title}</span>
                    <button class="delete-btn" onclick="deleteDoc('${doc.id}', event)">×</button>
                `;
                docList.appendChild(li);
            });
        }

        // Create a completely new document
        function createNewDoc() {
            const id = generateId();
            const newDoc = { id: id, title: "Untitled Glitter Doc" };
            
            const docs = getSavedDocs();
            docs.push(newDoc);
            saveSavedDocsList(docs);

            localStorage.setItem(id, JSON.stringify({ title: newDoc.title, content: "Start typing here... ✨" }));
            
            currentDocId = id;
            initializeSidebar();
            loadDoc(id);
        }

        // Load document into editor
        function loadDoc(id) {
            currentDocId = id;
            const docData = JSON.parse(localStorage.getItem(id));
            if (docData) {
                document.getElementById('doc-title').value = docData.title;
                document.getElementById('editor').innerHTML = docData.content;
                updateWordCount();
            }
        }

        // Load the last document worked on, or create one if fresh
        function loadDefaultOrLatestDoc() {
            const docs = getSavedDocs();
            if (docs.length > 0) {
                loadDoc(docs[docs.length - 1].id);
            } else {
                createNewDoc();
            }
        }

        // Auto-save typing and Title inputs
        function saveCurrentDoc() {
            if (!currentDocId) return;

            const title = document.getElementById('doc-title').value || "Untitled";
            const content = document.getElementById('editor').innerHTML;

            // Save the document data body
            localStorage.setItem(currentDocId, JSON.stringify({ title, content }));

            // Update the title in the system manifest
            const docs = getSavedDocs();
            const docIndex = docs.findIndex(d => d.id === currentDocId);
            if (docIndex !== -1 && docs[docIndex].title !== title) {
                docs[docIndex].title = title;
                saveSavedDocsList(docs);
                initializeSidebar(); // Refresh names on the sidebar dynamically
            }

            updateWordCount();
            showSaveIndicator();
        }

        // Delete a document
        function deleteDoc(id, event) {
            event.stopPropagation(); // Stop click from trying to open the file
            if(confirm("Are you sure you want to delete this cute doc forever? 🥺")) {
                localStorage.removeItem(id);
                let docs = getSavedDocs();
                docs = docs.filter(d => d.id !== id);
                saveSavedDocsList(docs);
                
                initializeSidebar();
                if (currentDocId === id) {
                    loadDefaultOrLatestDoc();
                }
            }
        }

        // Flash UI save message
        function showSaveIndicator() {
            const status = document.getElementById('status');
            status.innerText = "Saving to system memory... ✨";
            setTimeout(() => {
                status.innerText = "Status: All changes saved to local storage ✨";
            }, 800);
        }

        // Live stats counter
        function updateWordCount() {
            const text = document.getElementById('editor').innerText.trim();
            const count = text === "" ? 0 : text.split(/\s+/).length;
            document.getElementById('word-count').innerText = `Words: ${count}`;
        }

        function setupWordCounter() {
            document.getElementById('editor').addEventListener('keyup', updateWordCount);
        }
    </script>
</body>
</html>
