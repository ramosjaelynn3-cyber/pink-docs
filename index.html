<script>
let docs = JSON.parse(localStorage.getItem("docs")) || [];
let current = null;

const ed = document.getElementById("editor");
const title = document.getElementById("title");

/* MENU */
function toggleMenu(){
    document.getElementById("menu").style.display =
    document.getElementById("menu").style.display === "block" ? "none" : "block";
}

/* DOCS */
function newDoc(){
    let d = {id:Date.now(), title:"Untitled", content:""};
    docs.unshift(d);
    current = d.id;
    load();
    render();
    save();
}

function load(){
    let d = docs.find(x=>x.id===current);
    if(!d) return;
    title.value = d.title;
    ed.innerHTML = d.content;
}

function render(){
    document.getElementById("docs").innerHTML = "";
    docs.forEach(d=>{
        let div = document.createElement("div");
        div.className = "doc";
        div.innerText = d.title;
        div.onclick = ()=>{
            current = d.id;
            load();
        };
        document.getElementById("docs").appendChild(div);
    });
}

function del(){
    docs = docs.filter(x=>x.id!==current);
    current = docs[0]?.id || null;
    render();
    load();
    save();
}

function save(){
    let d = docs.find(x=>x.id===current);
    if(!d) return;
    d.title = title.value;
    d.content = ed.innerHTML;
    localStorage.setItem("docs", JSON.stringify(docs));
}

/* =========================
   ✨ EDITOR CORE FIX
   ========================= */

/* wrap selected text helper */
function wrapSelection(styleObj){
    const sel = window.getSelection();
    if(!sel.rangeCount) return;

    const range = sel.getRangeAt(0);
    if(range.collapsed) return;

    const span = document.createElement("span");

    Object.keys(styleObj).forEach(k=>{
        span.style[k] = styleObj[k];
    });

    const contents = range.extractContents();
    span.appendChild(contents);
    range.insertNode(span);

    sel.removeAllRanges();
}

/* FORMATTING */
function cmd(c){ document.execCommand(c); }

/* HIGHLIGHT */
function hl(color){
    document.execCommand("hiliteColor", false, color);
}

function clearHL(){
    document.execCommand("hiliteColor", false, "transparent");
}

/* =========================
   ✔ FIXED FONT SIZE SYSTEM
   ========================= */

function applySize(size){
    wrapSelection({ fontSize: size });
}

/* dropdown handler */
function setSize(val){
    if(val === "custom"){
        document.getElementById("customSize").style.display = "inline-block";
        document.getElementById("customSize").focus();
        return;
    }

    document.getElementById("customSize").style.display = "none";
    applySize(val);
}

/* custom size input (NOW WORKS PROPERLY) */
function setCustomSize(){
    let size = document.getElementById("customSize").value;
    if(!size) return;
    applySize(size);
}

/* FONT FAMILY */
function font(f){
    wrapSelection({ fontFamily: f });
}

/* FONT COLOR */
function toggleColor(){
    let p = document.getElementById("colorPalette");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

function fontColor(c){
    wrapSelection({ color: c });
}

/* PALETTES */
function togglePalette(){
    let p = document.getElementById("palette");
    p.style.display = p.style.display === "block" ? "none" : "block";
}

/* PDF */
function pdf(){
    const { jsPDF } = window.jspdf;
    const p = new jsPDF();
    p.text(title.value, 10, 10);
    p.text(ed.innerText, 10, 20);
    p.save("doc.pdf");
}

/* AUTO SAVE */
ed.addEventListener("input", save);
title.addEventListener("input", save);

/* INIT */
if(docs.length){
    current = docs[0].id;
    load();
}else{
    newDoc();
}
render();
</script>
