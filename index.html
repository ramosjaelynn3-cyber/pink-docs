<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✧LessbyDocs✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Nunito', sans-serif;
    background:
        radial-gradient(circle at top left, #ffd6ec 0%, transparent 30%),
        radial-gradient(circle at bottom right, #ffb6d9 0%, transparent 30%),
        linear-gradient(135deg, #ffe6f3, #ffcce6);
    height: 100vh;
    overflow: hidden;
    color: #5b2a45;
}

.app {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(12px);
}

/* SIDEBAR */

.sidebar {
    width: 280px;
    background: rgba(255,255,255,0.45);
    border-right: 2px solid rgba(255,255,255,0.5);
    padding: 24px;
    overflow-y: auto;
    box-shadow: 8px 0 20px rgba(255, 130, 180, 0.15);
}

.logo {
    font-family: 'Quicksand', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #ff4fa0;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.new-doc-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff80bf, #ff4fa0);
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 22px;
    transition: 0.2s ease;
    box-shadow: 0 6px 16px rgba(255, 79, 160, 0.3);
}

.new-doc-btn:hover {
    transform: translateY(-2px) scale(1.02);
}

.doc-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.doc-item {
    padding: 14px;
    background: rgba(255,255,255,0.55);
    border-radius: 16px;
    cursor: pointer;
    transition: 0.2s;
    border: 2px solid transparent;
}

.doc-item:hover {
    background: rgba(255,255,255,0.8);
    transform: scale(1.02);
}

.doc-item.active {
    border-color: #ff66ad;
    background: rgba(255,255,255,0.9);
}

.doc-title {
    font-weight: 700;
    margin-bottom: 4px;
}

.doc-preview {
    font-size: 13px;
    opacity: 0.7;
}

/* MAIN AREA */

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
}

.topbar {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.title-input {
    border: none;
    background: rgba(255,255,255,0.6);
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 22px;
    font-weight: bold;
    width: 60%;
    color: #7a2d57;
    outline: none;
    box-shadow: 0 4px 12px rgba(255,255,255,0.3);
}

.stats {
    background: rgba(255,255,255,0.5);
    padding: 12px 16px;
    border-radius: 14px;
    font-weight: bold;
}

.editor {
    position: relative;
    z-index: 1;
    flex: 1;
    background: rgba(255,255,255,0.55);
    border-radius: 28px;
    padding: 36px;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 10px 30px rgba(255, 120, 170, 0.12);
    overflow-y: auto;
}

textarea {
    font-family: var(--editor-font, 'Nunito', sans-serif);
    pointer-events: auto;
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    resize: none;
    outline: none;
    font-size: var(--editor-size);
    line-height: 1.8;
    color: #5c2945;
    font-weight: var(--editor-weight);
}

textarea::placeholder {
    color: #cc7ca5;
}

.footer {
    margin-top: 14px;
    text-align: right;
    font-size: 14px;
    opacity: 0.7;
}

.sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    animation: float 2s linear forwards;
}

@keyframes float {
    0% {
        opacity: 1;
        transform: translateY(0px) scale(1);
    }

    100% {
        opacity: 0;
        transform: translateY(-80px) scale(1.5);
    }
}

@media (max-width: 900px) {
    .sidebar {
        width: 220px;
    }

    .title-input {
        width: 100%;
    }

    .topbar {
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
    }
}

</style>
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="logo">✧LessyDocs✧</div>

        <button class="new-doc-btn" onclick="createDoc()">
            + New Document
        </button>

        <div class="doc-list" id="docList"></div>
    </aside>

    <main class="main">

        <div class="topbar">
            <input
                id="titleInput"
                class="title-input"
                placeholder="New Document"
            />

            <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">

                <select
                    onchange="changeFont(this.value)"
                    onclick="event.stopPropagation()"
                    id="fontSelect"
                    style="
                        border:none;
                        padding:12px 16px;
                        border-radius:14px;
                        background:rgba(255,255,255,0.7);
                        font-weight:bold;
                        color:#7a2d57;
                        cursor:pointer;
                    "
                >
                    <option>LessyTarif</option>
                    <option>Y2K</option>
                    <option>Typewriter</option>
                    <option>Diary</option>
                    <option>ComicSans</option>
                    <option>Elegant</option>
                    <option>Cyber</option>
                    <option>Handwritten</option>
                    <option>Retro Terminal</option>
                </select>

                <select
                    onchange="changeSize(this.value)"
                    onclick="event.stopPropagation()"
                    id="sizeSelect"
                    style="
                        border:none;
                        padding:12px 16px;
                        border-radius:14px;
                        background:rgba(255,255,255,0.7);
                        font-weight:bold;
                        color:#7a2d57;
                        cursor:pointer;
                    "
                >
                    <option value="16px">16</option>
                    <option value="18px" selected>18</option>
                    <option value="20px">20</option>
                    <option value="22px">22</option>
                    <option value="24px">24</option>
                    <option value="28px">28</option>
                </select>

                <button
                    type="button"
                    onclick="toggleBold()"
                    style="
                        border:none;
                        padding:12px 18px;
                        border-radius:14px;
                        background:rgba(255,255,255,0.7);
                        font-weight:bold;
                        color:#7a2d57;
                        cursor:pointer;
                    "
                >
                    B
                </button>

                <div class="stats">
                    <span id="wordCount">0</span> words
                </div>

            </div>
        </div>

        <div class="editor">
            <textarea
                id="editor"
                placeholder="✧Start writing... ✧"
            ></textarea>
        </div>

        <div class="footer">
            autosaves instantly ♡
        </div>

    </main>

</div>

<script>

let docs;

try {
    docs = JSON.parse(localStorage.getItem('pinkDocs')) || [];

    if (!Array.isArray(docs)) {
        docs = [];
    }
} catch {
    docs = [];
}
let currentDocId = null;

const editor = document.getElementById('editor');
const titleInput = document.getElementById('titleInput');
const docList = document.getElementById('docList');
const wordCount = document.getElementById('wordCount');

function saveDocs() {
    localStorage.setItem('pinkDocs', JSON.stringify(docs));
}

function createDoc() {
    const newDoc = {
        id: Date.now(),
        title: 'Untitled Document',
        content: ''
    };

    docs.unshift(newDoc);
    currentDocId = newDoc.id;

    saveDocs();
    renderDocs();
    loadCurrentDoc();
}

function renderDocs() {
    docList.innerHTML = '';

    docs.forEach(doc => {
        const div = document.createElement('div');
        div.className = 'doc-item';

        if (doc.id === currentDocId) {
            div.classList.add('active');
        }

        div.innerHTML = `
            <div class="doc-title">${doc.title}</div>
            <div class="doc-preview">
                ${doc.content.substring(0, 40) || 'Empty document'}
            </div>
        `;

        div.onclick = () => {
            currentDocId = doc.id;
            loadCurrentDoc();
            renderDocs();
        };

        docList.appendChild(div);
    });
}

function loadCurrentDoc() {
    const doc = docs.find(d => d.id === currentDocId);

    if (!doc) return;

    titleInput.value = doc.title;
    editor.value = doc.content;

    updateWordCount();
}

function updateCurrentDoc() {
    const doc = docs.find(d => d.id === currentDocId);

    if (!doc) return;

    doc.title = titleInput.value || 'Untitled Document';
    doc.content = editor.value;

    saveDocs();
    renderDocs();
    updateWordCount();
}

function updateWordCount() {
    const words = editor.value
        .trim()
        .split(/\s+/)
        .filter(word => word.length > 0).length;

    wordCount.textContent = words;
}

editor.addEventListener('input', updateCurrentDoc);
titleInput.addEventListener('input', updateCurrentDoc);

if (!docs || docs.length === 0) {
    createDoc();
} else {
    currentDocId = docs[0].id;
    renderDocs();
    loadCurrentDoc();
}

/* FONT SYSTEM */

const fonts = {
    "Cute": "'Nunito', sans-serif",
    "Y2K": "'Quicksand', sans-serif",
    "Typewriter": "'Courier New', monospace",
    "Diary": "'Georgia', serif",
    "Bubblegum": "'Comic Sans MS', cursive",
    "Elegant": "'Playfair Display', serif",
    "Cyber": "'Space Grotesk', sans-serif",
    "Handwritten": "'Caveat', cursive",
    "Retro Terminal": "'VT323', monospace"
};

const savedFont = localStorage.getItem('pinkDocsFont') || 'Cute';

const savedSize = localStorage.getItem('pinkDocsSize') || '18px';
const savedWeight = localStorage.getItem('pinkDocsWeight') || 'normal';

window.addEventListener('DOMContentLoaded', () => {
    const fontSelect = document.getElementById('fontSelect');
    const sizeSelect = document.getElementById('sizeSelect');

    if (fontSelect) {
        fontSelect.value = savedFont;
    }

    if (sizeSelect) {
        sizeSelect.value = savedSize;
    }

    document.documentElement.style.setProperty('--editor-font', fonts[savedFont]);
    document.documentElement.style.setProperty('--editor-size', savedSize);
    document.documentElement.style.setProperty('--editor-weight', savedWeight);
});

/* preserve old documents safely */

if (!localStorage.getItem('pinkDocsBackup')) {
    localStorage.setItem('pinkDocsBackup', JSON.stringify(docs));
}

 localStorage.getItem('pinkDocsSize') || '18px';


function changeFont(fontName) {
    document.documentElement.style.setProperty('--editor-font', fonts[fontName]);
    localStorage.setItem('pinkDocsFont', fontName);
}

function changeSize(size) {
    document.documentElement.style.setProperty('--editor-size', size);
    localStorage.setItem('pinkDocsSize', size);
}

function toggleBold() {
    const currentWeight = getComputedStyle(document.documentElement)
        .getPropertyValue('--editor-weight');

    const newWeight = currentWeight.trim() === 'bold'
        ? 'normal'
        : 'bold';

    document.documentElement.style.setProperty('--editor-weight', newWeight);
    localStorage.setItem('pinkDocsWeight', newWeight);
}

/* Sparkles */

document.addEventListener('mousemove', (e) => {
    if (Math.random() > 0.92) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.innerHTML = '✦';

        sparkle.style.left = e.pageX + 'px';
        sparkle.style.top = e.pageY + 'px';

        document.body.appendChild(sparkle);

        setTimeout(() => {
            sparkle.remove();
        }, 2000);
    }
});

</script>

</body>
</html>
```
