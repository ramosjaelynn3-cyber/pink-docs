<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨AngelDocs✨</title>
    <style>
        :root {
            --bg-color: #ffeef8;
            --primary-pink: #ff85c2;
            --dark-pink: #d9418d;
            --light-pink: #fff0f7;
            --accent-blue: #a3e5ff;
            --text-color: #4a283c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--light-pink) 20%, transparent 20%),
                              radial-gradient(var(--light-pink) 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER AREA --- */
        header {
            background: white;
            border-bottom: 4px ridge var(--primary-pink);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .left-header {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px var(--accent-blue);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .doc-info {
            display: flex;
            flex-direction: column;
            width: 60%;
        }

        #doc-title {
            font-size: 20px;
            border: 2px dotted transparent;
            padding: 4px 8px;
            color: var(--dark-pink);
            font-weight: bold;
            background: none;
            outline: none;
            border-radius: 5px;
            width: 100%;
        }

        #doc-title:focus, #doc-title:hover {
            border-color: var(--primary-pink);
            background: var(--light-pink);
        }

        /* --- TOOLBAR --- */
        .toolbar {
            background: var(--light-pink);
            border-bottom: 3px double var(--primary-pink);
            padding: 8px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar button, .toolbar select {
            background: white;
            border: 2px solid var(--primary-pink);
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            color: var(--dark-pink);
            box-shadow: 2px 2px 0px var(--primary-pink);
            transition: all 0.1s ease;
        }

        .toolbar button:active {
            box-shadow: 0px 0px 0px var(--primary-pink);
            transform: translate(2px, 2px);
        }

        .toolbar button:hover, .toolbar select:hover {
            background: #fff6fb;
            border-color: var(--dark-pink);
        }

        /* --- MAIN WORKSPACE --- */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Editor View Container */
        .editor-view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* Document Action Strip */
        .action-strip {
            background: white;
            padding: 8px 40px;
            display: flex;
            gap: 12px;
            border-bottom: 1px dashed var(--primary-pink);
        }

        .action-btn {
            font-size: 12px;
            background: var(--light-pink);
            border: 1px solid var(--primary-pink);
            color: var(--dark-pink);
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .action-btn:hover {
            background: var(--primary-pink);
            color: white;
        }

        /* Document Editor Page Wrapper */
        .editor-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; /* Space between discrete pages */
            background: #fff0f7;
        }

        /* CSS styled precisely to represent a physical letter page */
        .page {
            width: 8.5in;
            height: 11in;
            max-height: 11in;
            background: white;
            padding: 1in;
            box-shadow: 0px 4px 20px rgba(217, 65, 141, 0.15);
            border: 3px double var(--primary-pink);
            border-radius: 8px;
            outline: none;
            font-size: 16px;
            line-height: 1.5;
            color: #333;
            overflow: hidden; /* Prevents text bleeding down out of limits */
            word-wrap: break-word;
        }

        /* --- HOMEPAGE VIEW DASHBOARD --- */
        .homepage-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            background-image: radial-gradient(var(--light-pink) 20%, transparent 20%),
                              radial-gradient(var(--light-pink) 20%, transparent 20%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            padding: 40px;
            overflow-y: auto;
            z-index: 5;
            display: none;
        }

        .homepage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px auto;
            border-bottom: 3px double var(--primary-pink);
            padding-bottom: 15px;
        }

        .homepage-header h1 {
            color: var(--dark-pink);
            text-shadow: 1px 1px var(--accent-blue);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .doc-card {
            background: white;
            border: 3px solid var(--primary-pink);
            border-radius: 8px;
            box-shadow: 4px 4px 0px var(--primary-pink);
            padding: 20px;
            height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s ease;
        }

        .doc-card:hover {
            transform: scale(1.02);
            border-color: var(--dark-pink);
        }

        .doc-card-title {
            font-weight: bold;
            color: var(--dark-pink);
            font-size: 16px;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .doc-card-preview {
            font-size: 11px;
            color: #777;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
            line-height: 1.4;
        }

        /* --- STATUS BAR --- */
        footer {
            background: white;
            border-top: 3px ridge var(--primary-pink);
            padding: 5px 20px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            color: var(--dark-pink);
            font-weight: bold;
            z-index: 10;
        }

        /* --- PRINT MANIPULATION FOR CLEAN PDF EXPORTS --- */
        @media print {
            body, .main-container, .editor-container {
                background: white !important;
                background-image: none !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
                padding: 0 !important;
                gap: 0 !important;
            }
            header, .toolbar, .action-strip, footer, .homepage-view {
                display: none !important;
            }
            .editor-view {
                display: block !important;
            }
            .page {
                box-shadow: none !important;
                border: none !important;
                padding: 1in !important;
                margin: 0 !important;
                width: 8.5in !important;
                height: 11in !important;
                page-break-after: always !important;
                display: block !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="left-header">
            <div class="logo" onclick="showHomepage()">✨AngelDocs✨</div>
            <div class="doc-info" id="header-doc-info">
                <input type="text" id="doc-title" value="Untitled Doc" oninput="saveCurrentDoc()">
            </div>
        </div>
        <div>
            <button class="toolbar button" onclick="createNewDoc()" style="margin: 0;">New Doc</button>
        </div>
    </header>

    <div class="toolbar" id="app-toolbar">
        <select onchange="applyFont(this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Font</option>
            <option value="'Courier New', Courier, monospace">Courier</option>
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="'Times New Roman', Times, serif">Times New Roman</option>
            <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans</option>
            <option value="Impact, Charcoal, sans-serif">Impact</option>
        </select>

        <button onclick="format('bold')"><b>B</b></button>
        <button onclick="format('italic')"><i>I</i></button>
        <button onclick="format('underline')"><u>U</u></button>
        <button onclick="format('strikeThrough')"><s>S</s></button>
        
        <select onchange="format('formatBlock', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Style</option>
            <option value="H1">Heading 1</option>
            <option value="H2">Heading 2</option>
            <option value="P">Paragraph</option>
        </select>

        <select onchange="format('fontSize', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Size</option>
            <option value="3">Small</option>
            <option value="4">Normal</option>
            <option value="5">Large</option>
            <option value="6">Huge</option>
        </select>

        <select onchange="format('foreColor', this.value); this.selectedIndex=0;">
            <option value="" selected disabled>Color</option>
            <option value="#d9418d">Pink</option>
            <option value="#a3e5ff">Blue</option>
            <option value="#7d53de">Purple</option>
            <option value="#000000">Black</option>
        </select>

        <button onclick="format('justifyLeft')">Align L</button>
        <button onclick="format('justifyCenter')">Center</button>
        <button onclick="format('justifyRight')">Align R</button>
        <button onclick="format('insertUnorderedList')">List</button>
    </div>

    <div class="main-container">
        
        <div class="editor-view" id="editor-view">
            <div class="action-strip">
                <button class="action-btn" onclick="saveCurrentDoc()">Save Doc</button>
                <button class="action-btn" onclick="downloadPDF()">Download as PDF</button>
                <button class="action-btn" style="border-color: red; color: red;" onclick="deleteCurrentDoc()">Delete Doc</button>
            </div>
            
            <div class="editor-container" id="pages-container" oninput="handlePagePagination(event)">
                </div>
        </div>

        <div class="homepage-view" id="homepage-view">
            <div class="homepage-header">
                <h1>Your Documents</h1>
            </div>
            <div class="grid-container" id="homepage-grid">
                </div>
        </div>

    </div>

    <footer>
        <span id="status">Status: All changes saved to local storage</span>
        <span id="word-count">Words: 0</span>
    </footer>

    <script>
        let currentDocId = '';

        window.onload = function() {
            const docs = getSavedDocs();
            if (docs.length > 0) {
                showHomepage();
            } else {
                createNewDoc();
            }
        };

        function format(command, value = null) {
            document.execCommand(command, false, value);
            saveCurrentDoc();
        }

        function applyFont(fontFamily) {
            document.execCommand('styleWithCSS', false, true);
            document.execCommand('fontName', false, fontFamily);
            saveCurrentDoc();
        }

        function generateId() {
            return 'doc_' + Date.now();
        }

        function getSavedDocs() {
            const docs = localStorage.getItem('angel_docs_manifest');
            return docs ? JSON.parse(docs) : [];
        }

        function saveSavedDocsList(list) {
            localStorage.setItem('angel_docs_manifest', JSON.stringify(list));
        }

        function showHomepage() {
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('app-toolbar').style.display = 'none';
            document.getElementById('header-doc-info').style.display = 'none';
            document.getElementById('homepage-view').style.display = 'block';
            renderHomepageGrid();
        }

        function showEditor() {
            document.getElementById('editor-view').style.display = 'flex';
            document.getElementById('app-toolbar').style.display = 'flex';
            document.getElementById('header-doc-info').style.display = 'flex';
            document.getElementById('homepage-view').style.display = 'none';
        }

        function renderHomepageGrid() {
            const grid = document.getElementById('homepage-grid');
            grid.innerHTML = '';
            const docs = getSavedDocs();

            if(docs.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--dark-pink);">No documents found. Click "New Doc" to get started.</p>';
                return;
            }

            docs.forEach(doc => {
                const docData = JSON.parse(localStorage.getItem(doc.id)) || { pages: [''] };
                // Aggregate text across pages for preview
                const plainText = docData.pages.map(p => {
                    const d = document.createElement('div');
                    d.innerHTML = p;
                    return d.innerText || d.textContent;
                }).join(' ').substring(0, 120) + '...';

                const card = document.createElement('div');
                card.className = 'doc-card';
                card.setAttribute('onclick', `loadDoc('${doc.id}')`);
                card.innerHTML = `
                    <div>
                        <div class="doc-card-title">${doc.title}</div>
                        <div class="doc-card-preview">${plainText}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function createNewDoc() {
            const id = generateId();
            const newDoc = { id: id, title: "Untitled Doc" };
            
            const docs = getSavedDocs();
            docs.push(newDoc);
            saveSavedDocsList(docs);

            localStorage.setItem(id, JSON.stringify({ title: newDoc.title, pages: ["Start typing here..."] }));
            
            showEditor();
            loadDoc(id);
        }

        // Load document split cleanly into dynamic structural pages
        function loadDoc(id) {
            currentDocId = id;
            const docData = JSON.parse(localStorage.getItem(id));
            if (docData) {
                document.getElementById('doc-title').value = docData.title;
                const container = document.getElementById('pages-container');
                container.innerHTML = '';

                // Re-build editable blocks per stored array block
                const pagesArray = docData.pages || [""];
                pagesArray.forEach((pageContent, idx) => {
                    createPageElement(pageContent);
                });

                updateWordCount();
                showEditor();
            }
        }

        // Page factory helper
        function createPageElement(content = '') {
            const container = document.getElementById('pages-container');
            const page = document.createElement('div');
            page.className = 'page';
            page.contentEditable = 'true';
            page.innerHTML = content;
            container.appendChild(page);
            return page;
        }

        /* --- THE PAGINATION ENGINE --- */
        function handlePagePagination(e) {
            const container = document.getElementById('pages-container');
            const pages = Array.from(container.getElementsByClassName('page'));
            
            pages.forEach((page, index) => {
                // If text height exceeds standard Letter boundaries (11 inches / ~1056 pixels max)
                if (page.scrollHeight > page.clientHeight) {
                    let nextPage = pages[index + 1];
                    
                    // If no next physical page exists on layout, construct one dynamically
                    if (!nextPage) {
                        nextPage = createPageElement();
                    }

                    // Move cascading bottom node overflow characters straight into top of next sheet
                    // This creates a smooth continuous chain reaction down subsequent pages
                    while (page.scrollHeight > page.clientHeight && page.lastChild) {
                        nextPage.insertBefore(page.lastChild, nextPage.firstChild);
                    }

                    // Set user text focus straight into the new active sheet
                    nextPage.focus();
                }
            });

            // Clean up: If a page becomes totally empty because text was backspaced/deleted
            for (let i = pages.length - 1; i > 0; i--) {
                if (pages[i].innerHTML.trim() === '' && document.activeElement !== pages[i]) {
                    pages[i].remove();
                }
            }

            saveCurrentDoc();
        }

        function saveCurrentDoc() {
            if (!currentDocId) return;

            const title = document.getElementById('doc-title').value || "Untitled Doc";
            const container = document.getElementById('pages-container');
            const pages = Array.from(container.getElementsByClassName('page'));
            
            // Map the contents of individual page views into an array structure
            const pagesContentArray = pages.map(page => page.innerHTML);

            localStorage.setItem(currentDocId, JSON.stringify({ title: title, pages: pagesContentArray }));

            const docs = getSavedDocs();
            const docIndex = docs.findIndex(d => d.id === currentDocId);
            if (docIndex !== -1 && docs[docIndex].title !== title) {
                docs[docIndex].title = title;
                saveSavedDocsList(docs);
            }

            updateWordCount();
            showSaveIndicator();
        }

        function deleteCurrentDoc() {
            if (!currentDocId) return;
            if(confirm("Are you sure you want to delete this document?")) {
                localStorage.removeItem(currentDocId);
                let docs = getSavedDocs();
                docs = docs.filter(d => d.id !== currentDocId);
                saveSavedDocsList(docs);
                
                currentDocId = '';
                showHomepage();
            }
        }

        function downloadPDF() {
            const initialTitle = document.title;
            const docTitle = document.getElementById('doc-title').value || "Untitled Doc";
            
            document.title = docTitle; 
            window.print();
            document.title = initialTitle;
        }

        function showSaveIndicator() {
            const status = document.getElementById('status');
            status.innerText = "Saving to system memory...";
            setTimeout(() => {
                status.innerText = "Status: All changes saved to local storage";
            }, 800);
        }

        function updateWordCount() {
            const container = document.getElementById('pages-container');
            const text = container.innerText.trim();
            const count = text === "" ? 0 : text.split(/\s+/).length;
            document.getElementById('word-count').innerText = `Words: ${count}`;
        }
    </script>
</body>
</html>
