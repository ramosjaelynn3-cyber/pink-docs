<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✧LessbyDocs✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Nunito', sans-serif;
    background:
        radial-gradient(circle at top left, #ffd6ec 0%, transparent 30%),
        radial-gradient(circle at bottom right, #ffb6d9 0%, transparent 30%),
        linear-gradient(135deg, #ffe6f3, #ffcce6);
    height: 100vh;
    overflow: hidden;
    color: #5b2a45;
}

.app {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(12px);
}

/* SIDEBAR */

.sidebar {
    width: 280px;
    background: rgba(255,255,255,0.45);
    border-right: 2px solid rgba(255,255,255,0.5);
    padding: 24px;
    overflow-y: auto;
    box-shadow: 8px 0 20px rgba(255, 130, 180, 0.15);
}

.logo {
    font-family: 'Quicksand', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 24px;
    color: #ff4fa0;
}

.new-doc-btn, .action-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    color: white;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
    transition: 0.2s ease;
}

.new-doc-btn {
    background: linear-gradient(135deg, #ff80bf, #ff4fa0);
}

.action-btn {
    background: linear-gradient(135deg, #ff5fa2, #d94b8a);
}

.doc-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.doc-item {
    padding: 14px;
    background: rgba(255,255,255,0.55);
    border-radius: 16px;
    cursor: pointer;
    transition: 0.2s;
    border: 2px solid transparent;
}

.doc-item:hover {
    background: rgba(255,255,255,0.8);
    transform: scale(1.02);
}

.doc-item.active {
    border-color: #ff66ad;
    background: rgba(255,255,255,0.9);
}

.doc-title {
    font-weight: 700;
    margin-bottom: 4px;
}

.doc-preview {
    font-size: 13px;
    opacity: 0.7;
}

/* MAIN */

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
}

.title-input {
    border: none;
    background: rgba(255,255,255,0.6);
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 22px;
    font-weight: bold;
    width: 60%;
    color: #7a2d57;
    outline: none;
}

.editor {
    flex: 1;
    background: rgba(255,255,255,0.55);
    border-radius: 28px;
    padding: 36px;
    overflow-y: auto;
}

textarea {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    resize: none;
    outline: none;
    font-size: var(--editor-size);
    line-height: 1.8;
    color: #5c2945;
}

</style>
</head>

<body>

<div class="app">

<aside class="sidebar">
    <div class="logo">✧LessyDocs✧</div>

    <button class="new-doc-btn" onclick="createDoc()">+ New Document</button>

    <!-- NEW ACTION BUTTONS -->
    <button class="action-btn" onclick="manualSave()">💾 Save</button>
    <button class="action-btn" onclick="downloadPDF()">📄 Download PDF</button>
    <button class="action-btn" onclick="deleteDoc()">🗑 Delete</button>

    <div class="doc-list" id="docList"></div>
</aside>

<main class="main">

    <div class="topbar">
        <input id="titleInput" class="title-input" placeholder="New Document" />

        <div class="stats">
            <span id="wordCount">0</span> words
        </div>
    </div>

    <div class="editor">
        <textarea id="editor" placeholder="✧Start writing... ✧"></textarea>
    </div>

</main>

</div>

<script>

let docs = JSON.parse(localStorage.getItem('pinkDocs')) || [];
let currentDocId = null;

const editor = document.getElementById('editor');
const titleInput = document.getElementById('titleInput');
const docList = document.getElementById('docList');
const wordCount = document.getElementById('wordCount');

function saveDocs() {
    localStorage.setItem('pinkDocs', JSON.stringify(docs));
}

function createDoc() {
    const newDoc = {
        id: Date.now(),
        title: 'Untitled Document',
        content: ''
    };

    docs.unshift(newDoc);
    currentDocId = newDoc.id;

    saveDocs();
    renderDocs();
    loadCurrentDoc();
}

function renderDocs() {
    docList.innerHTML = '';

    docs.forEach(doc => {
        const div = document.createElement('div');
        div.className = 'doc-item';

        if (doc.id === currentDocId) div.classList.add('active');

        div.innerHTML = `
            <div class="doc-title">${doc.title}</div>
            <div class="doc-preview">${doc.content.substring(0,40) || 'Empty document'}</div>
        `;

        div.onclick = () => {
            currentDocId = doc.id;
            loadCurrentDoc();
            renderDocs();
        };

        docList.appendChild(div);
    });
}

function loadCurrentDoc() {
    const doc = docs.find(d => d.id === currentDocId);
    if (!doc) return;

    titleInput.value = doc.title;
    editor.value = doc.content;
    updateWordCount();
}

function updateCurrentDoc() {
    const doc = docs.find(d => d.id === currentDocId);
    if (!doc) return;

    doc.title = titleInput.value || 'Untitled Document';
    doc.content = editor.value;

    saveDocs();
    renderDocs();
    updateWordCount();
}

function manualSave() {
    updateCurrentDoc();
    saveDocs();
    alert("Saved!");
}

function deleteDoc() {
    if (!currentDocId) return;

    docs = docs.filter(d => d.id !== currentDocId);

    if (docs.length > 0) {
        currentDocId = docs[0].id;
    } else {
        createDoc();
        return;
    }

    saveDocs();
    renderDocs();
    loadCurrentDoc();
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const title = titleInput.value;
    const content = editor.value;

    doc.setFontSize(16);
    doc.text(title, 10, 10);

    doc.setFontSize(12);
    const split = doc.splitTextToSize(content, 180);
    doc.text(split, 10, 20);

    doc.save((title || "document") + ".pdf");
}

function updateWordCount() {
    const words = editor.value.trim().split(/\s+/).filter(Boolean).length;
    wordCount.textContent = words;
}

editor.addEventListener('input', updateCurrentDoc);
titleInput.addEventListener('input', updateCurrentDoc);

if (!docs.length) {
    createDoc();
} else {
    currentDocId = docs[0].id;
    renderDocs();
    loadCurrentDoc();
}

</script>

</body>
</html>
