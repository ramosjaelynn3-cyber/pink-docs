<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✧LessyDocs✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Nunito', sans-serif;

    background:
        radial-gradient(circle at top left, #ffd6ec 0%, transparent 30%),
        radial-gradient(circle at bottom right, #ffb6d9 0%, transparent 30%),
        linear-gradient(135deg, #ffe6f3, #ffcce6);

    height: 100vh;
    overflow: hidden;
    color: #5b2a45;
}

.app {
    display: flex;
    height: 100vh;
    backdrop-filter: blur(16px);
}

/* SIDEBAR */
.sidebar {
    width: 280px;
    background: rgba(255,255,255,0.4);
    border-right: 2px solid rgba(255,255,255,0.6);
    padding: 24px;
    box-shadow: 8px 0 20px rgba(255, 130, 180, 0.15);
}

.logo {
    font-size: 28px;
    font-weight: 700;
    color: #ff4fa0;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
}

.new-doc-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff80bf, #ff4fa0);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 16px;
}

/* DOCS */
.doc-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.doc-item {
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: 0.2s;
}

.doc-item:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.8);
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
}

/* TOP BAR (CUTE FOCUSED) */
.topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;

    background: rgba(255,255,255,0.45);
    padding: 14px;
    border-radius: 22px;

    backdrop-filter: blur(20px);
    box-shadow: 0 12px 30px rgba(255,120,170,0.18);
}

/* FILE MENU */
.file {
    position: relative;
}

.file button {
    border: none;
    padding: 10px 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
    font-weight: bold;
    color: #7a2d57;
}

.dropdown {
    position: absolute;
    top: 42px;
    left: 0;

    background: rgba(255,255,255,0.9);
    border-radius: 14px;
    padding: 10px;

    display: flex;
    flex-direction: column;
    gap: 8px;

    box-shadow: 0 12px 25px rgba(255,120,170,0.25);
}

.hidden { display: none; }

.dropdown button {
    border: none;
    background: transparent;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
}

.dropdown button:hover {
    background: rgba(255,182,217,0.3);
}

/* TITLE */
.title {
    flex: 1;
    padding: 12px;
    border-radius: 16px;
    border: none;
    background: rgba(255,255,255,0.6);
    font-size: 20px;
    color: #7a2d57;
    font-weight: bold;
}

/* TOOLS */
.tools {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.tools button,
.tools select {
    border: none;
    padding: 8px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.7);
    cursor: pointer;
}

/* EDITOR */
.editor {
    flex: 1;
    margin-top: 16px;

    background: rgba(255,255,255,0.55);
    border-radius: 28px;
    padding: 32px;

    border: 2px solid rgba(255,255,255,0.6);

    box-shadow: 0 12px 35px rgba(255, 120, 170, 0.18);

    overflow-y: auto;
    outline: none;
    font-size: 18px;
    line-height: 1.8;
}

/* SCROLL FIX */
body { overflow-y: auto; }
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">✧LessyDocs✧</div>
    <button class="new-doc-btn" onclick="createDoc()">+ New</button>
    <div class="doc-list" id="docList"></div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">

        <div class="file">
            <button onclick="toggleFile()">File ✦</button>
            <div id="menu" class="dropdown hidden">
                <button onclick="save()">💾 Save</button>
                <button onclick="downloadPDF()">📄 PDF</button>
                <button onclick="deleteDoc()">🗑 Delete</button>
            </div>
        </div>

        <input id="title" class="title" placeholder="Untitled"/>

        <div class="tools">
            <button onclick="cmd('bold')"><b>B</b></button>
            <button onclick="cmd('italic')"><i>I</i></button>
            <button onclick="cmd('underline')"><u>U</u></button>
            <button onclick="cmd('justifyCenter')">⬌</button>
            <button onclick="highlight()">🌸</button>

            <select onchange="font(this.value)">
                <option value="Nunito">Cute</option>
                <option value="Quicksand">Y2K</option>
                <option value="Caveat">Handwritten</option>
                <option value="VT323">Retro</option>
            </select>
        </div>

    </div>

    <div id="editor" class="editor" contenteditable="true"></div>

</div>

</div>

<script>
let editor = document.getElementById("editor");
let title = document.getElementById("title");

/* MENU */
function toggleFile(){
    document.getElementById("menu").classList.toggle("hidden");
}

/* DOC */
function save(){
    localStorage.setItem("doc", JSON.stringify({
        title: title.value,
        content: editor.innerHTML
    }));
}

function load(){
    let d = JSON.parse(localStorage.getItem("doc"));
    if(!d) return;
    title.value = d.title;
    editor.innerHTML = d.content;
}

function createDoc(){
    editor.innerHTML = "";
    title.value = "";
    save();
}

function deleteDoc(){
    localStorage.removeItem("doc");
    editor.innerHTML = "";
    title.value = "";
}

/* EDITING */
function cmd(c){
    document.execCommand(c);
}

function highlight(){
    document.execCommand("hiliteColor", false, "#ffb6d9");
}

function font(f){
    document.execCommand("fontName", false, f);
}

/* PDF */
function downloadPDF(){
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    pdf.text(title.value || "doc", 10, 10);
    pdf.text(editor.innerText, 10, 20);

    pdf.save("doc.pdf");
}

/* AUTO SAVE */
editor.addEventListener("input", save);
title.addEventListener("input", save);

load();
</script>

</body>
</html>
