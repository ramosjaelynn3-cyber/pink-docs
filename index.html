<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✧LessbyDocs✧</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&family=Playfair+Display:wght@400;700&family=Space+Grotesk:wght@400;700&family=Caveat:wght@400;700&family=VT323&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">✧LessyDocs✧</div>

    <button class="new-doc-btn" onclick="createDoc()">+ New Document</button>

    <div class="doc-list" id="docList"></div>
</aside>

<!-- MAIN -->
<main class="main">

    <!-- TOP BAR -->
    <div class="topbar">

        <!-- FILE MENU (CUTE RESTORED STYLE) -->
        <div class="file-menu">
            <button onclick="toggleFileMenu()">✦ File</button>

            <div id="fileDropdown" class="dropdown hidden">
                <button onclick="manualSave()">Save</button>
                <button onclick="downloadPDF()">Export PDF</button>
                <button onclick="deleteDoc()">Delete</button>
            </div>
        </div>

        <input id="titleInput" class="title-input" placeholder="New Document"/>

        <div class="controls">

            <select onchange="changeFont(this.value)">
                <option value="Cute">Cute</option>
                <option value="Y2K">Y2K</option>
                <option value="Typewriter">Typewriter</option>
                <option value="Diary">Diary</option>
                <option value="Elegant">Elegant</option>
                <option value="Cyber">Cyber</option>
                <option value="Handwritten">Handwritten</option>
                <option value="Retro Terminal">Retro Terminal</option>
            </select>

            <select onchange="changeSize(this.value)">
                <option value="16px">16</option>
                <option value="18px" selected>18</option>
                <option value="22px">22</option>
                <option value="26px">26</option>
            </select>

            <button onclick="toggleBold()">B</button>

            <div class="stats">
                <span id="wordCount">0</span> words
            </div>

        </div>
    </div>

    <!-- EDITOR -->
    <div class="editor">
        <textarea id="editor" placeholder="✧Start writing...✧"></textarea>
    </div>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
