<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pink Docs</title>

  <link rel="stylesheet" href="style.css">

  <!-- Quill Editor -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>

<body>

  <div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>🌸 Characters</h2>

      <div class="card" onclick="openCard('luna')">
        🌙 Luna
      </div>

      <div class="card" onclick="openCard('mika')">
        💗 Mika
      </div>

    </div>

    <!-- MAIN AREA -->
    <div class="main">

      <div class="topbar">
        <h1>Pink Docs</h1>
        <button onclick="login()">Login</button>
      </div>

      <div id="editor"></div>

    </div>

  </div>

  <!-- CHARACTER POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-content">
      <span onclick="closePopup()" class="close">✖</span>
      <h2 id="charName"></h2>
      <p id="charInfo"></p>
      <div id="fanart"></div>
    </div>
  </div>

  <!-- Quill -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="app.js"></script>

</body>
</html>
